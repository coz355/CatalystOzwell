<!-- 
  Drop-in replacement / enhancement for the "Location Intelligence" section
  in your current index.html

  Paste this in place of the existing TRAVELER & CAMPER TELEMETRY block.
  It keeps your existing styling but makes it feel much more holistic + futuristic.
-->

<div class="mt-8 panel glass rounded-3xl p-6 border border-white/10">
    <div class="flex justify-between items-center mb-5">
        <div>
            <div class="font-semibold text-lg flex items-center gap-2">
                <span>Location Intelligence</span>
                <span class="text-[10px] px-2 py-0.5 rounded-full bg-cyan-400/10 text-cyan-400">LIVE</span>
            </div>
            <div class="text-xs text-white/50">Personal Context • Weather • Air • Solar • AI Suggestions</div>
        </div>
        <button onclick="refreshTravelerTelemetry()" 
                class="text-xs px-4 py-1.5 border border-white/20 rounded-xl hover:bg-white/5 transition-colors">
            <i class="fa-solid fa-sync mr-1"></i> Refresh Context
        </button>
    </div>

    <!-- Main Telemetry Grid -->
    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3" id="traveler-grid">
        <!-- Populated by JS -->
    </div>

    <!-- Holistic AI + Context Layer -->
    <div class="mt-6 pt-6 border-t border-white/10">
        <div class="text-xs uppercase tracking-[2px] text-white/50 mb-3 flex items-center gap-2">
            <i class="fa-solid fa-brain text-cyan-400"></i>
            <span>COZWELL PERSONAL CONTEXT</span>
        </div>

        <div class="grid md:grid-cols-2 gap-4 text-sm">
            
            <!-- Current Conditions + AI Insight -->
            <div class="bg-black/30 rounded-2xl p-4 border border-white/10">
                <div class="text-xs text-white/50 mb-2">CURRENT CONDITIONS</div>
                <div id="holistic-conditions" class="space-y-1 text-white/90">
                    <!-- JS injected -->
                </div>
            </div>

            <!-- AI Recommendation -->
            <div class="bg-black/30 rounded-2xl p-4 border border-white/10 flex flex-col">
                <div class="text-xs text-emerald-400 mb-2 flex items-center gap-2">
                    <i class="fa-solid fa-lightbulb"></i>
                    <span>COZWELL RECOMMENDATION</span>
                </div>
                <div id="ai-location-insight" class="flex-1 text-white/90 text-sm leading-snug">
                    <!-- Populated by calling one of the agents or a lightweight local suggestion -->
                </div>
                <button onclick="getLocationBasedAIInsight()" 
                        class="mt-3 self-start text-xs px-3 py-1 rounded-xl border border-emerald-400/30 hover:bg-emerald-400/10 text-emerald-300">
                    Ask CozWELL for insight
                </button>
            </div>
        </div>
    </div>

    <!-- Quick Action Pills -->
    <div class="mt-4 flex flex-wrap gap-2">
        <button onclick="quickAskAgent('well', 'Given current weather and location, what should I do for my wellbeing right now?')" 
                class="text-xs px-3 py-1 rounded-2xl border border-rose-400/30 hover:bg-rose-400/10 text-rose-300 flex items-center gap-1">
            <i class="fa-solid fa-heart"></i> Wellbeing tip
        </button>
        <button onclick="quickAskAgent('eng', 'Any interesting engineering or observation opportunity based on my current location and conditions?')" 
                class="text-xs px-3 py-1 rounded-2xl border border-amber-400/30 hover:bg-amber-400/10 text-amber-300 flex items-center gap-1">
            <i class="fa-solid fa-cogs"></i> Local engineering angle
        </button>
        <button onclick="quickAskAgent('edu', 'Teach me something interesting about the geography, history or nature of my current location.')" 
                class="text-xs px-3 py-1 rounded-2xl border border-sky-400/30 hover:bg-sky-400/10 text-sky-300 flex items-center gap-1">
            <i class="fa-solid fa-graduation-cap"></i> Learn about here
        </button>
    </div>
</div>
