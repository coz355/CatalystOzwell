    <title>Catalyst Ozwell | Love&LightHealth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
            background: #0a0e27;
            transition: all 0.5s ease;
        }

        /* Dynamic Background with Animation */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            transition: all 0.5s ease;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .light-orbs {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            transition: all 0.5s ease;
        }

        .orb1 { width: 300px; height: 300px; background: radial-gradient(circle, #00d4ff, transparent); top: -100px; left: -100px; animation: float 20s infinite ease-in-out; }
        .orb2 { width: 250px; height: 250px; background: radial-gradient(circle, #ff006e, transparent); bottom: -50px; right: -50px; animation: float 25s infinite ease-in-out reverse; }
        .orb3 { width: 200px; height: 200px; background: radial-gradient(circle, #00f5ff, transparent); top: 50%; right: 10%; animation: float 30s infinite ease-in-out; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(30px, -30px); }
            50% { transform: translate(-20px, 20px); }
            75% { transform: translate(20px, 30px); }
        }

            }
            document.getElementById('authModal').classList.add('hidden');
            updateUserUI();
            renderChat();
        }

        function updateUserUI() {
            const btn = document.getElementById('userProfileBtn');
            const chatUsername = document.getElementById('chatUsername');
            
            if (currentUser) {
                btn.textContent = `👤 ${currentUser.username}`;
                chatUsername.textContent = `@${currentUser.username}`;
            } else if (guestUsername) {
                btn.textContent = '👤 Sign In';
                chatUsername.textContent = `@${guestUsername}`;
            } else {
                btn.textContent = '👤 Sign In';
                chatUsername.textContent = 'Guest';
            }
        }

        // ===== CHAT =====
        function toggleChat() {
            const sidebar = document.getElementById('chatSidebar');
            const main = document.getElementById('mainContainer');
            sidebar.classList.toggle('open');
            main.classList.toggle('shifted');
        }

        function sendChatMessage(e) {
            e.preventDefault();
            const input = document.getElementById('chatInputField');
            const txt = input.value.trim();
            if (!txt) return;

            let user;
            if (currentUser) {
                user = currentUser.username;
            } else if (guestUsername) {
                user = guestUsername;
            } else {
                guestUsername = getRandomAnonName();
                user = guestUsername;
                updateUserUI();
            }

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            initialChatMessages.push({ user, text: txt, time });
            if (initialChatMessages.length > 50) initialChatMessages.shift();
            input.value = '';
            renderChat();
        }

        function renderChat() {
            const box = document.getElementById('chatMessages');
            box.innerHTML = '';
            initialChatMessages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'chat-msg-row';
                div.innerHTML = `<span class="chat-msg-time">[${msg.time || 'now'}]</span> <span class="chat-msg-author">@${msg.user}:</span> ${msg.text}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
            const concurrentCount = Math.floor(Math.random() * 20) + 10;
            document.getElementById('chatUsersCount').textContent = `Active: ${concurrentCount}/50`;
        }

        // ===== CUSTOMIZATION =====
        function toggleCustomization() {
            const content = document.querySelector('.customization-content');
            content.classList.toggle('active');
        }

        function initializeColors() {
            const colorGrid = document.getElementById('colorGrid');
            colors.forEach((color, index) => {
                const opt = document.createElement('div');
                opt.className = 'color-option';
                opt.style.backgroundColor = color.accent;
                if (index === 0) opt.classList.add('active');
                opt.onclick = () => {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    document.documentElement.style.setProperty('--accent-color', color.accent);
                    document.documentElement.style.setProperty('--secondary-color', color.secondary);
                    document.documentElement.style.setProperty('--tertiary-color', color.tertiary);
                    document.documentElement.style.setProperty('--quaternary-color', color.quaternary);
                    localStorage.setItem('selectedColor', JSON.stringify(color));
                };
                colorGrid.appendChild(opt);
            });

            const saved = localStorage.getItem('selectedColor');
            if (saved) {
                const color = JSON.parse(saved);
                document.documentElement.style.setProperty('--accent-color', color.accent);
                document.documentElement.style.setProperty('--secondary-color', color.secondary);
                document.documentElement.style.setProperty('--tertiary-color', color.tertiary);
                document.documentElement.style.setProperty('--quaternary-color', color.quaternary);
            }
        }

        function initializeLanguageGrid() {
            const languageGrid = document.getElementById('languageGrid');
            languageGrid.innerHTML = '';
            languageList.forEach(lang => {
                const btn = document.createElement('button');
                btn.className = 'language-option';
                if (lang.code === currentLanguage) btn.classList.add('active');
                btn.textContent = `${lang.flag} ${lang.name}`;
                btn.onclick = () => setLanguage(lang.code);
                languageGrid.appendChild(btn);
            });
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            updatePageLanguage();
            localStorage.setItem('selectedLanguage', lang);
            updateLanguageGrid();
        }

        function updatePageLanguage() {
            const elements = document.querySelectorAll('[data-i18n]');
            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (languages[currentLanguage] && languages[currentLanguage][key]) {
                    el.textContent = languages[currentLanguage][key];
                }
            });
        }

        function setTheme(type) {
            document.body.className = '';
            if (type !== 'default') {
                document.body.classList.add('theme-' + type);
            }
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            localStorage.setItem('selectedTheme', type);
        }

        // ===== LOCATION =====
        async function detectLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                userLocation = {
                    lat: data.latitude,
                    lon: data.longitude,
                    city: data.city || 'Unknown',
                    country: data.country_code || 'US'
                };
                document.getElementById('location').textContent = `${userLocation.city}, ${userLocation.country}`;
            } catch (error) {
                document.getElementById('location').textContent = `${userLocation.city}, ${userLocation.country}`;
            }
        }

        // ===== INITIALIZATION =====
        window.addEventListener('load', () => {
            document.documentElement.style.setProperty('--accent-color', '#00d4ff');
            document.documentElement.style.setProperty('--secondary-color', '#00f5ff');
            document.documentElement.style.setProperty('--tertiary-color', '#ff006e');
            document.documentElement.style.setProperty('--quaternary-color', '#ff3d82');

            initializeColors();
            initializeLanguageGrid();
            updatePageLanguage();
            updateUserUI();
            
            initialChatMessages = [
                { user: 'System', text: 'Welcome to Catalyst Ozwell Chat!', time: '00:00' },
                { user: 'Admin', text: 'Feel free to share your thoughts and ideas.', time: '00:01' }
            ];
            renderChat();

            const savedTheme = localStorage.getItem('selectedTheme');
            if (savedTheme && savedTheme !== 'default') {
                document.body.classList.add('theme-' + savedTheme);
            }

            detectLocation();
            fetchWeather();
            fetchBibleQuote();
            fetchVolcanicActivity();
            fetchNews();

            setInterval(() => {
                fetchWeather();
                fetchBibleQuote();
                fetchVolcanicActivity();
                fetchNews();
            }, 600000);
        });
    </script>
</body>
