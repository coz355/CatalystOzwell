// Enhanced callAI with vision support
async function callAI(systemPrompt, userMessage, imageBase64 = null, model = CURRENT_MODEL) {
    let messages = [{ role: "system", content: systemPrompt }];
    
    if (imageBase64 && model === "gemma-4-e4b") {
        messages.push({
            role: "user",
            content: [
                { type: "text", text: userMessage },
                { type: "image_url", image_url: { url: `data:image/jpeg;base64,${imageBase64}` } }
            ]
        });
    } else {
        messages.push({ role: "user", content: userMessage });
    }
    
    const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model, messages, temperature: 0.7, max_tokens: 1024 })
    });
    const data = await res.json();
    return data.choices[0].message.content;
}

function previewImage(input, previewId) {
    const preview = document.getElementById(previewId);
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
            preview.innerHTML = `<img src="${e.target.result}" class="max-h-48 rounded border border-[#C9A227]/30">`;
            preview.classList.remove('hidden');
            preview.dataset.base64 = e.target.result.split(',')[1];
        };
        reader.readAsDataURL(input.files[0]);
    }
}
