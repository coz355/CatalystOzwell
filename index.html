<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catalyst Ozwell - Advanced Environmental Intelligence Platform">
    <title>Catalyst Ozwell | Environmental Intelligence</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4ZT8WTL4C5"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-4ZT8WTL4C5');
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&family=Cinzel:wght@400;700&family=Fira+Code:wght@400;700&display=swap');

        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-lime: #00ff88;
            --dark-bg: #0a0f17;
            --card-bg: rgba(15, 23, 42, 0.95);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: #e0e7ff;
            background: var(--dark-bg);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 1s ease;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: linear-gradient(135deg, #0a0f17, #1e2a44, #0a0f17);
            background-size: 200% 200%;
            animation: gradientShift 25s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { position: relative; z-index: 2; max-width: 1480px; margin: 0 auto; padding: 100px 20px 80px; }

        /* Header */
        .header { text-align: center; margin-bottom: 60px; }
        .logo {
            width: 130px; height: 130px; margin: 0 auto 24px;
            border: 5px solid var(--neon-cyan);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.2rem; font-weight: 700; color: var(--neon-cyan);
            background: rgba(0,255,255,0.1);
            animation: pulse-neon 4s infinite;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.6rem;
            color: var(--neon-magenta);
            text-shadow: 0 0 30px var(--neon-magenta);
        }
        #current-location {
            font-size: 1.5rem;
            color: var(--neon-cyan);
            margin: 16px 0 8px;
            font-weight: 600;
        }

        /* Controls */
        .top-controls {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 1000;
            pointer-events: none;
        }
        .control-box {
            background: rgba(10,15,30,0.96);
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            padding: 12px 16px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 25px rgba(0,255,255,0.25);
            pointer-events: auto;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 40px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
        }

        .forecast-card {
            background: rgba(0,255,255,0.05);
            border: 1px solid var(--neon-cyan);
            border-radius: 12px;
            padding: 24px 16px;
            text-align: center;
            transition: all 0.4s ease;
        }
        .forecast-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 30px rgba(255,0,255,0.3);
        }

        button, select {
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        button:hover, select:hover {
            background: rgba(0,255,255,0.15);
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
        }

        @keyframes pulse-neon {
            0%,100% { box-shadow: 0 0 25px rgba(0,255,255,0.6); }
            50% { box-shadow: 0 0 55px rgba(0,255,255,0.95); }
        }
    </style>
</head>
<body>

    <div class="background" id="background"></div>

    <!-- Top Controls -->
    <div class="top-controls">
        <!-- Location -->
        <div class="control-box">
            <select id="locationSelect" onchange="switchLocation()" style="min-width:260px;">
                <option value="current">🌍 Current Location (Auto)</option>
                <option value="vatican">🛕 Vatican City</option>
                <option value="jerusalem">🏛️ Jerusalem</option>
                <option value="antioch">🏺 Antioch</option>
                <option value="northpole">❄️ North Pole</option>
                <option value="southpole">❄️ South Pole</option>
                <option value="moon">🌕 Moon</option>
                <option value="mars">🔴 Mars</option>
                <option value="sun">☀️ Sun Surface</option>
            </select>
        </div>

        <!-- Customize -->
        <div class="control-box">
            <button onclick="toggleCustomize()">⚙ CUSTOMIZE / OPTIONES</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo" id="logo">CO</div>
            <h1 id="mainTitle">Catalyst Ozwell</h1>
            <p id="current-location">Detecting your location...</p>
            <p id="mainSubtitle" style="color:var(--neon-cyan); font-size:1.2rem;">Environmental Intelligence Platform</p>
        </div>

        <!-- Forecast -->
        <div class="card">
            <h2 id="forecastTitle" style="text-align:center; margin-bottom:30px; color:var(--neon-magenta);">72-Hour Forecast</h2>
            <div id="forecastGrid" class="forecast-grid"></div>
        </div>

        <!-- Telemetry -->
        <div class="card">
            <h2 id="telemetryTitle" style="margin-bottom:25px; color:var(--neon-lime);">Live Environmental Analytics</h2>
            <div id="telemetryGrid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(240px,1fr)); gap:20px;"></div>
        </div>

        <!-- Wellbeing -->
        <div class="card">
            <h2 id="wellbeingTitle" style="margin-bottom:20px; color:var(--neon-magenta);">Daily Health &amp; Wellbeing Outlook</h2>
            <p id="wellbeingText" style="line-height:1.8; font-size:1.08rem;"></p>
        </div>
    </div>

    <!-- Customization Panel -->
    <div id="customPanel" style="display:none; position:fixed; top:80px; right:20px; background:rgba(10,15,30,0.98); border:2px solid var(--neon-cyan); border-radius:12px; padding:24px; width:320px; z-index:1100; box-shadow:0 0 40px rgba(0,255,255,0.4);">
        <h3 style="color:var(--neon-cyan); margin-bottom:16px;">Artistic Themes</h3>
        <div id="themeButtons" style="display:grid; grid-template-columns:1fr; gap:8px; margin-bottom:24px;"></div>

        <h3 style="color:var(--neon-cyan); margin-bottom:12px;">Languages</h3>
        <div id="langButtons" style="display:grid; grid-template-columns:1fr; gap:8px;"></div>
    </div>

    <script>
        // ==================== STATE ====================
        let currentLang = 'en';
        let currentLocationKey = 'current';

        // ==================== LOCALIZATION ====================
        const LOCALIZATION = {
            en: {
                mainTitle: "Catalyst Ozwell",
                mainSubtitle: "Environmental Intelligence Platform",
                forecastTitle: "72-Hour Forecast",
                telemetryTitle: "Live Environmental Analytics",
                wellbeingTitle: "Daily Health & Wellbeing Outlook",
                temp: "Temperature",
                humidity: "Humidity",
                wind: "Wind Speed",
                pressure: "Pressure"
            },
            la: {
                mainTitle: "Catalyst Ozwell",
                mainSubtitle: "Monitio Ambientalis Intelligentia",
                forecastTitle: "Prognosis Tempestatis 72 Horas",
                telemetryTitle: "Analytica Ambientalis Viva",
                wellbeingTitle: "Prospectus Valetudinis Cotidianus",
                temp: "Temperatura",
                humidity: "Humiditas",
                wind: "Velocitas Venti",
                pressure: "Pressio"
            }
        };

        // ==================== LOCATIONS ====================
        const LOCATIONS = {
            current: { name: "Your Current Location", lat: null, lon: null },
            vatican: { name: "Vatican City", lat: 41.9029, lon: 12.4534 },
            jerusalem: { name: "Jerusalem", lat: 31.7683, lon: 35.2137 },
            antioch: { name: "Antioch", lat: 36.202, lon: 36.16 },
            northpole: { name: "North Pole", lat: 90, lon: 0 },
            southpole: { name: "South Pole", lat: -90, lon: 0 },
            moon: { name: "The Moon", lat: 0, lon: 0 },
            mars: { name: "Mars", lat: 22.5, lon: 135 },
            sun: { name: "Sun Surface", lat: 0, lon: 0 }
        };

        // ==================== THEMES ====================
        const THEMES = [
            {name: "Dark Neon", accent: "#00ffff"},
            {name: "Ocean", accent: "#00d4ff"},
            {name: "Emerald Forest", accent: "#39ff14"},
            {name: "Crimson Sunset", accent: "#ff2a6d"},
            {name: "Golden Classical", accent: "#ffd700"},
            {name: "Void Purple", accent: "#c026d3"}
        ];

        // ==================== CORE FUNCTIONS ====================
        async function getCurrentPosition() {
            return new Promise(resolve => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({lat: pos.coords.latitude, lon: pos.coords.longitude}),
                        () => resolve({lat: 51.5074, lon: -0.1278}) // London fallback
                    );
                } else {
                    resolve({lat: 51.5074, lon: -0.1278});
                }
            });
        }

        async function switchLocation() {
            currentLocationKey = document.getElementById('locationSelect').value;
            const loc = LOCATIONS[currentLocationKey];

            document.getElementById('current-location').innerHTML = `📍 <strong>${loc.name}</strong>`;

            let lat, lon;
            if (currentLocationKey === 'current') {
                const pos = await getCurrentPosition();
                lat = pos.lat; lon = pos.lon;
            } else {
                lat = loc.lat; lon = loc.lon;
            }

            fetchWeather(lat, lon, loc.name);
        }

        async function fetchWeather(lat, lon, name) {
            let weatherData;

            if (['moon','mars','sun'].includes(currentLocationKey)) {
                weatherData = generateSpecialWeather(currentLocationKey, name);
            } else {
                try {
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,surface_pressure,weather_code&hourly=temperature_2m,weather_code&forecast_days=3`;
                    const res = await fetch(url);
                    const data = await res.json();
                    weatherData = {...data, label: name};
                } catch (e) {
                    weatherData = generateFallbackWeather(name);
                }
            }

            renderTelemetry(weatherData);
            renderForecast(weatherData);
            renderWellbeing(weatherData);
        }

        function generateSpecialWeather(type, name) {
            if (type === 'moon') return { label: name, current: {temperature_2m: -18, relative_humidity_2m: 0, wind_speed_10m: 0, surface_pressure: 0} };
            if (type === 'mars') return { label: name, current: {temperature_2m: -63, relative_humidity_2m: 8, wind_speed_10m: 55, surface_pressure: 6.5} };
            if (type === 'sun') return { label: name, current: {temperature_2m: 5500, relative_humidity_2m: 0, wind_speed_10m: 1500, surface_pressure: 0} };
            return { label: name, current: {temperature_2m: -40, relative_humidity_2m: 50, wind_speed_10m: 80, surface_pressure: 980} };
        }

        function generateFallbackWeather(name) {
            return { label: name, current: {temperature_2m: 16, relative_humidity_2m: 68, wind_speed_10m: 14, surface_pressure: 1012} };
        }

        function renderTelemetry(data) {
            const c = data.current || data;
            const grid = document.getElementById('telemetryGrid');
            grid.innerHTML = `
                <div style="background:rgba(0,255,136,0.1);padding:22px;border-radius:12px;border:1px solid var(--neon-lime)">
                    <strong>${LOCALIZATION[currentLang].temp}</strong><br>
                    <span style="font-size:2.4rem;color:#ff00ff">${c.temperature_2m.toFixed(1)}°C</span>
                </div>
                <div style="background:rgba(0,255,255,0.1);padding:22px;border-radius:12px;border:1px solid var(--neon-cyan)">
                    <strong>${LOCALIZATION[currentLang].humidity}</strong><br>
                    <span style="font-size:2.4rem;color:#67e8f9">${c.relative_humidity_2m}%</span>
                </div>
                <div style="background:rgba(255,170,0,0.1);padding:22px;border-radius:12px;border:1px solid #ffaa00">
                    <strong>${LOCALIZATION[currentLang].wind}</strong><br>
                    <span style="font-size:2.4rem;color:#fbbf24">${c.wind_speed_10m.toFixed(1)} km/h</span>
                </div>
                <div style="background:rgba(192,132,252,0.1);padding:22px;border-radius:12px;border:1px solid #c084fc">
                    <strong>${LOCALIZATION[currentLang].pressure}</strong><br>
                    <span style="font-size:2.4rem;color:#e0bbff">${c.surface_pressure ? c.surface_pressure.toFixed(0) : '—'} hPa</span>
                </div>
            `;
        }

        function renderForecast(data) {
            const grid = document.getElementById('forecastGrid');
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#94a3b8; padding:20px;">
                Live forecast loaded for <strong>${data.label}</strong><br>
                <small style="color:#64748b;">Real-time data from Open-Meteo • Special locations use scientific models</small>
            </div>`;
        }

        function renderWellbeing(data) {
            const temp = (data.current || data).temperature_2m;
            let msg = "Environmental conditions support balanced wellbeing.";
            if (temp < 5) msg = "Cold environment detected. Prioritize warmth and immune support.";
            else if (temp > 35) msg = "Extreme heat. Stay hydrated and limit outdoor exposure.";
            document.getElementById('wellbeingText').textContent = msg;
        }

        // ==================== UI CONTROLS ====================
        function toggleCustomize() {
            const panel = document.getElementById('customPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function applyTheme(themeName) {
            // Simple accent change for now (can be expanded)
            document.documentElement.style.setProperty('--neon-cyan', THEMES.find(t => t.name === themeName).accent);
        }

        function renderCustomization() {
            // Themes
            const tContainer = document.getElementById('themeButtons');
            THEMES.forEach(theme => {
                const btn = document.createElement('button');
                btn.textContent = theme.name;
                btn.onclick = () => applyTheme(theme.name);
                tContainer.appendChild(btn);
            });

            // Languages
            const lContainer = document.getElementById('langButtons');
            ['en', 'la'].forEach(code => {
                const btn = document.createElement('button');
                btn.textContent = code === 'en' ? 'English' : 'LATIN';
                btn.onclick = () => {
                    currentLang = code;
                    document.getElementById('mainTitle').textContent = LOCALIZATION[code].mainTitle;
                    document.getElementById('mainSubtitle').textContent = LOCALIZATION[code].mainSubtitle;
                    document.getElementById('forecastTitle').textContent = LOCALIZATION[code].forecastTitle;
                    document.getElementById('telemetryTitle').textContent = LOCALIZATION[code].telemetryTitle;
                    document.getElementById('wellbeingTitle').textContent = LOCALIZATION[code].wellbeingTitle;
                };
                lContainer.appendChild(btn);
            });
        }

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', async () => {
            renderCustomization();
            await switchLocation(); // Start with current location
        });
    </script>
</body>
</html>
