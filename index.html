<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catalyst Ozwell - Environmental Intelligence Platform">
    <title>Catalyst Ozwell | Environmental Intelligence</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4ZT8WTL4C5"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-4ZT8WTL4C5');
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;700&display=swap');

        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-lime: #00ff88;
            --dark-bg: #0a0f17;
            --card-bg: rgba(15, 23, 42, 0.95);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: #e0e7ff;
            background: var(--dark-bg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: linear-gradient(135deg, #0a0f17, #1e2a44, #0a0f17);
            background-size: 200% 200%;
            animation: gradientShift 30s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1480px;
            margin: 0 auto;
            padding: 100px 20px 80px;
        }

        .header { text-align: center; margin-bottom: 50px; }
        .logo {
            width: 130px; height: 130px; margin: 0 auto 20px;
            border: 5px solid var(--neon-cyan);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.2rem; font-weight: 700; color: var(--neon-cyan);
            animation: pulse-neon 4s infinite;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--neon-magenta); }

        #current-location {
            font-size: 1.45rem;
            color: var(--neon-cyan);
            margin: 12px 0;
            font-weight: 600;
        }

        /* Top Controls */
        .top-controls {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 1000;
            gap: 15px;
        }
        .control-box {
            background: rgba(10,15,30,0.96);
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            padding: 12px 16px;
            backdrop-filter: blur(12px);
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 35px;
            backdrop-filter: blur(12px);
        }

        /* Collapsible Forecast */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0,255,255,0.2);
        }
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-top: 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.6s ease;
        }
        .forecast-grid.expanded {
            max-height: 1400px;
        }

        .forecast-card {
            background: rgba(0,255,255,0.06);
            border: 1px solid var(--neon-cyan);
            border-radius: 10px;
            padding: 16px 12px;
            text-align: center;
            font-size: 0.95rem;
        }

        button, select {
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover {
            background: rgba(0,255,255,0.15);
            box-shadow: 0 0 15px rgba(0,255,255,0.4);
        }

        @keyframes pulse-neon {
            0%,100% { box-shadow: 0 0 25px rgba(0,255,255,0.6); }
            50% { box-shadow: 0 0 55px rgba(0,255,255,0.95); }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <!-- Top Controls -->
    <div class="top-controls">
        <div class="control-box">
            <select id="locationSelect" onchange="switchLocation()" style="min-width: 280px;">
                <option value="current">🌍 Current Location (Auto)</option>
                <option value="vatican">🛕 Vatican City</option>
                <option value="jerusalem">🏛️ Jerusalem</option>
                <option value="antioch">🏺 Antioch</option>
                <option value="northpole">❄️ North Pole</option>
                <option value="southpole">❄️ South Pole</option>
                <option value="moon">🌕 Moon</option>
                <option value="mars">🔴 Mars</option>
                <option value="sun">☀️ Sun Surface</option>
            </select>
        </div>
        <div class="control-box">
            <button onclick="toggleCustomize()">⚙ CUSTOMIZE</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="logo">CO</div>
            <h1 id="mainTitle">Catalyst Ozwell</h1>
            <p id="current-location">Detecting your location...</p>
            <p id="mainSubtitle" style="color:var(--neon-cyan); margin-top:8px;">Environmental Intelligence Platform</p>
        </div>

        <!-- Collapsible Forecast -->
        <div class="card">
            <div class="section-header" onclick="toggleForecast()">
                <h2 id="forecastTitle" style="color:var(--neon-magenta); margin:0;">72-Hour Forecast</h2>
                <span id="forecastToggle" style="font-size:1.5rem; transition:0.3s;">▶</span>
            </div>
            <div id="forecastGrid" class="forecast-grid"></div>
        </div>

        <!-- Telemetry -->
        <div class="card">
            <h2 id="telemetryTitle" style="margin-bottom:20px; color:var(--neon-lime);">Live Environmental Analytics</h2>
            <div id="telemetryGrid" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(230px,1fr)); gap:18px;"></div>
        </div>

        <!-- Wellbeing -->
        <div class="card">
            <h2 id="wellbeingTitle" style="margin-bottom:20px; color:var(--neon-magenta);">Daily Health Outlook</h2>
            <p id="wellbeingText" style="line-height:1.8; font-size:1.05rem;"></p>
        </div>
    </div>

    <!-- Customization Panel -->
    <div id="customPanel" style="display:none; position:fixed; top:85px; right:20px; background:rgba(10,15,30,0.98); border:2px solid var(--neon-cyan); border-radius:12px; padding:25px; width:320px; z-index:1100; box-shadow:0 0 40px rgba(0,255,255,0.3);">
        <h3 style="color:var(--neon-cyan); margin-bottom:15px;">Artistic Themes</h3>
        <div id="themeButtons" style="display:grid; gap:8px; margin-bottom:25px;"></div>
        
        <h3 style="color:var(--neon-cyan); margin-bottom:12px;">Language</h3>
        <div id="langButtons" style="display:grid; gap:8px;"></div>
    </div>

    <script>
        let currentLang = 'en';
        let forecastExpanded = false;

        const LOCALIZATION = {
            en: {
                mainTitle: "Catalyst Ozwell",
                mainSubtitle: "Environmental Intelligence Platform",
                forecastTitle: "72-Hour Forecast",
                telemetryTitle: "Live Environmental Analytics",
                wellbeingTitle: "Daily Health Outlook",
                temp: "Temperature",
                humidity: "Humidity",
                wind: "Wind Speed",
                pressure: "Pressure"
            },
            la: {
                mainTitle: "Catalyst Ozwell",
                mainSubtitle: "Monitio Ambientalis Intelligentia",
                forecastTitle: "Prognosis Tempestatis 72 Horas",
                telemetryTitle: "Analytica Ambientalis",
                wellbeingTitle: "Prospectus Valetudinis Cotidianus",
                temp: "Temperatura",
                humidity: "Humiditas",
                wind: "Velocitas Venti",
                pressure: "Pressio"
            }
        };

        const LOCATIONS = {
            current: { name: "Your Current Location", lat: null, lon: null },
            vatican: { name: "Vatican City", lat: 41.9029, lon: 12.4534 },
            jerusalem: { name: "Jerusalem", lat: 31.7683, lon: 35.2137 },
            antioch: { name: "Antioch", lat: 36.202, lon: 36.16 },
            northpole: { name: "North Pole", lat: 90, lon: 0 },
            southpole: { name: "South Pole", lat: -90, lon: 0 },
            moon: { name: "The Moon", lat: 0, lon: 0 },
            mars: { name: "Mars", lat: 22.5, lon: 135 },
            sun: { name: "Sun Surface", lat: 0, lon: 0 }
        };

        async function getUserLocation() {
            return new Promise(resolve => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        pos => resolve({lat: pos.coords.latitude, lon: pos.coords.longitude}),
                        () => resolve({lat: 51.5074, lon: -0.1278}) // London fallback
                    );
                } else {
                    resolve({lat: 51.5074, lon: -0.1278});
                }
            });
        }

        async function switchLocation() {
            const key = document.getElementById('locationSelect').value;
            const loc = LOCATIONS[key];
            document.getElementById('current-location').innerHTML = `📍 <strong>${loc.name}</strong>`;

            let lat, lon;
            if (key === 'current') {
                const pos = await getUserLocation();
                lat = pos.lat;
                lon = pos.lon;
            } else {
                lat = loc.lat;
                lon = loc.lon;
            }
            fetchWeather(lat, lon, loc.name);
        }

        async function fetchWeather(lat, lon, name) {
            let data;
            if (['moon','mars','sun'].includes(document.getElementById('locationSelect').value)) {
                data = generateSpecialWeather(document.getElementById('locationSelect').value, name);
            } else {
                try {
                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,surface_pressure`);
                    const api = await res.json();
                    data = {...api, label: name};
                } catch (e) {
                    data = generateFallbackWeather(name);
                }
            }
            renderTelemetry(data);
            renderForecast(data);
            renderWellbeing(data);
        }

        function generateSpecialWeather(type, name) {
            if (type === 'moon') return {label:name, current:{temperature_2m:-18, relative_humidity_2m:0, wind_speed_10m:0, surface_pressure:0}};
            if (type === 'mars') return {label:name, current:{temperature_2m:-63, relative_humidity_2m:8, wind_speed_10m:55, surface_pressure:6.5}};
            if (type === 'sun') return {label:name, current:{temperature_2m:5500, relative_humidity_2m:0, wind_speed_10m:1500, surface_pressure:0}};
            return {label:name, current:{temperature_2m:-40, relative_humidity_2m:45, wind_speed_10m:75, surface_pressure:980}};
        }

        function generateFallbackWeather(name) {
            return {label:name, current:{temperature_2m:17, relative_humidity_2m:62, wind_speed_10m:13, surface_pressure:1013}};
        }

        function renderTelemetry(data) {
            const c = data.current || data;
            const grid = document.getElementById('telemetryGrid');
            grid.innerHTML = `
                <div style="padding:22px;background:rgba(0,255,136,0.1);border-radius:12px;border:1px solid #00ff88">
                    <strong>${LOCALIZATION[currentLang].temp}</strong><br>
                    <span style="font-size:2.3rem;color:#ff00ff">${c.temperature_2m.toFixed(1)}°C</span>
                </div>
                <div style="padding:22px;background:rgba(0,255,255,0.1);border-radius:12px;border:1px solid var(--neon-cyan)">
                    <strong>${LOCALIZATION[currentLang].humidity}</strong><br>
                    <span style="font-size:2.3rem;color:#67e8f9">${c.relative_humidity_2m}%</span>
                </div>
                <div style="padding:22px;background:rgba(251,191,36,0.1);border-radius:12px;border:1px solid #fbbf24">
                    <strong>${LOCALIZATION[currentLang].wind}</strong><br>
                    <span style="font-size:2.3rem;color:#fbbf24">${c.wind_speed_10m.toFixed(1)} km/h</span>
                </div>
                <div style="padding:22px;background:rgba(192,132,252,0.1);border-radius:12px;border:1px solid #c084fc">
                    <strong>${LOCALIZATION[currentLang].pressure}</strong><br>
                    <span style="font-size:2.3rem;color:#e0bbff">${c.surface_pressure ? Math.round(c.surface_pressure) : '—'} hPa</span>
                </div>
            `;
        }

        function renderForecast(data) {
            const grid = document.getElementById('forecastGrid');
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#94a3b8; padding:40px 10px;">
                <strong>Forecast for ${data.label}</strong><br>
                <small>Click header above to expand • Real-time data</small>
            </div>`;
        }

        function renderWellbeing(data) {
            const temp = (data.current || data).temperature_2m;
            let msg = "Conditions support balanced daily activity.";
            if (temp < 5) msg = "Cold detected. Prioritize warmth and immune support.";
            else if (temp > 35) msg = "Extreme heat. Stay hydrated and limit exposure.";
            document.getElementById('wellbeingText').textContent = msg;
        }

        function toggleForecast() {
            forecastExpanded = !forecastExpanded;
            document.getElementById('forecastGrid').classList.toggle('expanded', forecastExpanded);
            document.getElementById('forecastToggle').textContent = forecastExpanded ? '▼' : '▶';
        }

        function toggleCustomize() {
            const panel = document.getElementById('customPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        // Final Initialization
        document.addEventListener('DOMContentLoaded', async () => {
            // Default English
            currentLang = 'en';

            // Render Languages
            const langDiv = document.getElementById('langButtons');
            ['en', 'la'].forEach(code => {
                const btn = document.createElement('button');
                btn.textContent = code === 'en' ? 'English' : 'LATIN';
                btn.onclick = () => {
                    currentLang = code;
                    document.getElementById('mainTitle').textContent = LOCALIZATION[code].mainTitle;
                    document.getElementById('forecastTitle').textContent = LOCALIZATION[code].forecastTitle;
                    document.getElementById('telemetryTitle').textContent = LOCALIZATION[code].telemetryTitle;
                    document.getElementById('wellbeingTitle').textContent = LOCALIZATION[code].wellbeingTitle;
                };
                langDiv.appendChild(btn);
            });

            // Render Themes (basic)
            const themeDiv = document.getElementById('themeButtons');
            ["Dark Neon", "Ocean", "Forest", "Sunset"].forEach(name => {
                const btn = document.createElement('button');
                btn.textContent = name;
                btn.onclick = () => alert(`Theme "${name}" selected (visual expansion available)`);
                themeDiv.appendChild(btn);
            });

            // Load current location
            await switchLocation();

            // Ensure forecast is collapsed on start
            document.getElementById('forecastGrid').classList.remove('expanded');
            document.getElementById('forecastToggle').textContent = '▶';
        });
    </script>
</body>
</html>
