    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

        :root {
            --accent-primary: #d4af37;
            --accent-secondary: #c9a961;
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-lime: #00ff00;
            --neon-pink: #ff1493;
            --dark-bg: #0f1419;
            --card-bg: rgba(20, 25, 35, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #e8e8e8;
            background: var(--dark-bg);
            overflow-x: hidden;
        }

        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 50%, #0d1117 100%);
            background-attachment: fixed;
        }

        .ambient-light {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; pointer-events: none;
        }

        .light-accent {
            position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.08; mix-blend-mode: screen;
        }

        .light-accent-1 { width: 400px; height: 400px; background: radial-gradient(circle, var(--neon-cyan), transparent); top: 10%; left: 5%; animation: drift 25s ease-in-out infinite; }
        .light-accent-2 { width: 300px; height: 300px; background: radial-gradient(circle, var(--neon-magenta), transparent); bottom: 15%; right: 10%; animation: drift 30s ease-in-out infinite reverse; }

        @keyframes drift { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(30px, -30px); } }

        @keyframes neon-glow {
            0%, 100% { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
            50% { text-shadow: 0 0 20px currentColor, 0 0 40px currentColor, 0 0 60px currentColor; }
        }

        .location-badge {
            position: fixed; top: 20px; left: 20px; background: rgba(20, 25, 35, 0.95);
            border: 2px solid var(--neon-cyan); padding: 12px 20px; border-radius: 30px;
            font-size: 0.95rem; color: var(--neon-cyan); z-index: 999; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.5); backdrop-filter: blur(12px);
        }

        .clock { font-family: 'Times New Roman', serif; font-size: 1.15rem; font-weight: 700; color: var(--neon-lime); letter-spacing: 1px; }

        .customization-panel {
            position: fixed; top: 40px; right: 40px; z-index: 1000;
            background: rgba(20,25,35,0.95); border: 2px solid var(--neon-cyan);
            border-radius: 8px; padding: 20px; max-width: 280px;
            backdrop-filter: blur(20px); box-shadow: 0 0 30px rgba(0,255,255,0.4);
        }

        .customization-toggle {
            background: transparent; color: var(--neon-cyan); border: 2px solid var(--neon-cyan);
            padding: 14px 24px; border-radius: 6px; cursor: pointer; font-weight: 700;
            width: 100%; transition: all 0.3s; font-size: 1rem;
        }

        .customization-toggle:hover {
            background: rgba(0,255,255,0.15); box-shadow: 0 0 25px rgba(0,255,255,0.7); transform: translateY(-2px);
        }

        .customization-content { display: none; margin-top: 20px; }
        .customization-content.active { display: block; }

        .theme-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }

        .theme-btn {
            padding: 12px; border: 2px solid var(--neon-cyan); background: transparent;
            color: var(--neon-cyan); border-radius: 6px; cursor: pointer; font-weight: 600;
            transition: all 0.3s;
        }

        .theme-btn:hover, .theme-btn.active {
            border-color: var(--neon-magenta); background: rgba(255,0,255,0.15);
            color: var(--neon-magenta); box-shadow: 0 0 20px rgba(255,0,255,0.6);
        }

        .weather-forecast, .telemetry, .sun-section, .wellbeing-suggestion {
            width: 100%; background: rgba(20,25,35,0.8); border: 2px solid var(--neon-cyan);
            border-radius: 8px; padding: 50px; margin-bottom: 60px;
            box-shadow: 0 0 30px rgba(0,255,255,0.3); backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 1.45rem; color: var(--neon-magenta); font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase; animation: neon-glow 2s infinite;
            font-family: 'Times New Roman', serif;
        }

        .forecast-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 22px; }
        .forecast-card {
            background: rgba(0,255,255,0.05); border: 2px solid var(--neon-cyan);
            border-radius: 8px; padding: 28px; transition: all 0.4s;
        }
        .forecast-card:hover {
            transform: translateY(-10px); border-color: var(--neon-magenta);
            box-shadow: 0 0 35px rgba(255,0,255,0.5);
        }

        .telemetry-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 16px; }
        .telemetry-item {
            background: rgba(0,255,0,0.05); border: 2px solid var(--neon-lime);
            border-radius: 8px; padding: 20px;
        }
