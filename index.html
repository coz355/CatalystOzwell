<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CozWELL • Neural Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700&family=Cinzel:wght@400;500;700&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap');

        :root {
            --accent1: #00f3ff;
            --accent2: #ff00aa;
            --accent3: #8b00ff;
            --accent4: #39ff14;
            --font-display: 'Space Grotesk', system_ui, sans-serif;
        }

        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: var(--font-display); letter-spacing: -0.025em; }

        .cyber-bg { background-color: #0a0a0f; }
        .glass {
            background: rgba(20, 20, 30, 0.78);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .neon-cyan { color: var(--accent1); text-shadow: 0 0 10px var(--accent1); }
        .neon-magenta { color: var(--accent2); text-shadow: 0 0 10px var(--accent2); }
        .neon-violet { color: var(--accent3); text-shadow: 0 0 10px var(--accent3); }

        .panel { transition: all 0.2s cubic-bezier(0.23,1,0.32,1); }
        .panel:hover { transform: translateY(-2px); }

        .weather-card {
            min-height: 148px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .temp-display {
            font-size: 2rem;
            line-height: 1;
            font-weight: 700;
            font-family: var(--font-display);
        }

        .scanline {
            position: absolute; inset: 0; pointer-events: none;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,243,255,0.02) 50%);
            background-size: 100% 5px; animation: scan 4s linear infinite;
            border-radius: inherit;
        }

        .music-player {
            background: rgba(15, 15, 25, 0.95);
            border: 1px solid rgba(0, 243, 255, 0.15);
        }

        .track-active {
            background: rgba(0, 243, 255, 0.1);
            border-left: 3px solid var(--accent1);
        }

        /* === NEW: Gothic Black & White Bible Reader === */
        .gothic-reader {
            background: #0a0a0a;
            color: #f4f1e9;
            font-family: 'Cinzel', Georgia, 'Times New Roman', serif;
        }
        .gothic-reader .book-title {
            font-family: 'UnifrakturMaguntia', 'Cinzel', serif;
            letter-spacing: 1px;
        }
        .gothic-reader .verse {
            margin-bottom: 0.85rem;
            line-height: 1.78;
            font-size: 1.02rem;
        }
        .gothic-reader .verse-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            color: #c9b89a;
            margin-right: 0.5rem;
            vertical-align: super;
        }
        .gothic-reader .chapter-head {
            font-family: 'UnifrakturMaguntia', serif;
            font-size: 1.35rem;
            letter-spacing: 2px;
            color: #d4c5a1;
            border-bottom: 1px solid #3a3326;
            padding-bottom: 0.5rem;
            margin: 1.6rem 0 0.9rem;
        }
        .gothic-reader .passage {
            max-width: 52rem;
            margin-left: auto;
            margin-right: auto;
        }
        .gothic-tab {
            transition: all 0.1s ease;
        }
        .gothic-tab.active {
            background: #1f1c17;
            color: #f4f1e9;
            border-color: #5c513a;
        }

        /* === Faith Telemetry === */
        .telemetry-bar {
            height: 9px;
            background: linear-gradient(90deg, #5c513a, #a38b5f);
            border-radius: 999px;
            transition: width 0.6s cubic-bezier(0.23,1,0.32,1);
        }
        .faith-stat {
            transition: transform 0.2s ease;
        }
        .faith-stat:hover {
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="cyber-bg text-white min-h-screen">
    <!-- Subtle animated multi-planet eclipse background -->
    <canvas id="planet-bg" class="fixed inset-0 pointer-events: none z-[-1] opacity-60"></canvas>
    <!-- Header -->
    <header class="border-b border-white/10 bg-black/40 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-cyan-400 to-violet-500 flex items-center justify-center">
                    <i class="fa-solid fa-brain text-black text-2xl"></i>
                </div>
                <div>
                    <h1 id="logo" class="text-4xl font-display font-semibold tracking-tighter neon-cyan">CozWELL</h1>
                    <div class="text-[9px] text-white/40 -mt-1 tracking-[1.5px]">CATALYST OZWELL</div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <!-- Local AI Status -->
                <div onclick="checkLocalAIStatus()" class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-2xl glass border border-white/10 hover:border-cyan-400/60 cursor-pointer transition-all">
                    <div id="ai-status-dot" class="w-2 h-2 rounded-full bg-amber-400"></div>
                    <div class="text-left leading-none">
                        <div class="text-[9px] text-white/50 -mb-px">LOCAL AI</div>
                        <div id="ai-status-text" class="text-xs font-medium text-white/80">192.168.178.72</div>
                    </div>
                </div>

                <!-- Clock -->
                <div class="hidden md:flex items-center gap-2 px-4 py-2 rounded-2xl glass border border-white/10">
                    <i class="fa-regular fa-clock text-cyan-400"></i>
                    <div id="clock" class="font-mono text-xl font-semibold tracking-[2.5px] neon-cyan">00:00:00</div>
                </div>

                <!-- Language -->
                <button onclick="showSettings()" class="px-3 py-2 rounded-2xl glass border border-white/10 hover:border-white/30 text-sm flex items-center gap-2">
                    <i class="fa-solid fa-globe"></i>
                    <span id="lang-display">EN</span>
                </button>

                <!-- Theme -->
                <button onclick="showSettings()" class="px-3 py-2 rounded-2xl glass border border-white/10 hover:border-white/30 text-sm flex items-center gap-2">
                    <i class="fa-solid fa-palette"></i>
                    <span id="theme-display">Neon</span>
                </button>

                <!-- Sacred Texts -->
                <button onclick="openBibleReader()" class="px-4 py-2 text-sm rounded-2xl border border-amber-400/30 hover:bg-amber-400/10 flex items-center gap-2 text-amber-300">
                    <i class="fa-solid fa-book-open"></i>
                    <span class="hidden md:inline">Sacred Texts</span>
                </button>

                <!-- Settings -->
                <button onclick="showSettings()" class="w-10 h-10 flex items-center justify-center rounded-2xl glass border border-white/10 hover:border-white/30">
                    <i class="fa-solid fa-cog"></i>
                </button>
            </div>
        </div>
    </header> 

    <!-- Location Selector -->
    <div class="max-w-7xl mx-auto px-6 pt-6">
        <div class="flex flex-wrap items-center gap-3">
            <span class="text-xs uppercase tracking-[2px] text-white/50">Location</span>

            <div onclick="showLocationPicker()"
                 class="flex items-center gap-3 px-5 py-2 rounded-2xl glass border border-white/10 hover:border-cyan-400/50 cursor-pointer">
                <i class="fa-solid fa-map-marker-alt text-cyan-400"></i>
                <span id="current-location" class="font-medium">Istanbul, TR</span>
                <i class="fa-solid fa-chevron-down text-xs text-white/40"></i>
            </div>

            <button onclick="detectUserLocation()"
                    class="px-4 py-2 text-sm rounded-2xl border border-white/20 hover:bg-white/5 flex items-center gap-2">
                <i class="fa-solid fa-location-arrow"></i>
                <span>Detect Location</span>
            </button>

            <button onclick="refreshAllData()"
                    class="px-4 py-2 text-sm rounded-2xl border border-white/20 hover:bg-white/5 flex items-center gap-2">
                <i class="fa-solid fa-sync-alt"></i>
                <span>Refresh Data</span>
            </button>
        </div>
    </div>
