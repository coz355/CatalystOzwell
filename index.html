<html lang="en">
<head>

    <meta name="description" content="Catalyst Ozwell - Welcome Wilkommen">
    <meta name="keywords" content="tech for holistic innovation in healthier future">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catalyst Ozwell | Love&LightHealth</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
            background: #0a0e27;
            -webkit-tap-highlight-color: transparent;
        }
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-size: 400% 400%; animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        .light-orbs { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; overflow: hidden; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.25; }

        /* Vertical Compact Customization Panel */
        .customization-panel {
            position: fixed; top: 12px; right: 12px; z-index: 1000;
            background: rgba(0,0,0,0.85); border: 2px solid var(--accent-color,#00d4ff);
            border-radius: 16px; padding: 12px; width: 56px; max-height: 85vh;
            overflow-y: auto; backdrop-filter: blur(12px); transition: width 0.4s;
        }
        .customization-panel.expanded { width: 260px; }
        .customization-toggle {
            background: var(--accent-color,#00d4ff); color: #000; border: none;
            border-radius: 12px; padding: 12px; width: 100%; font-size: 1.2rem; cursor: pointer;
        }
        .customization-content { display: none; margin-top: 12px; }
        .customization-panel.expanded .customization-content { display: block; }
        .customization-section { margin-bottom: 18px; text-align: left; }
        .customization-section h3 { font-size: 0.85rem; margin-bottom: 8px; color: var(--accent-color,#00d4ff); }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .color-option { width: 36px; height: 36px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; }
        .color-option.active { border: 3px solid white; box-shadow: 0 0 12px currentColor; }

        .theme-buttons, .city-grid, .language-grid { display: flex; flex-direction: column; gap: 6px; }
        .theme-btn, .city-option, .language-option {
            padding: 10px 12px; border: 2px solid var(--accent-color,#00d4ff);
            background: rgba(0,212,255,0.08); color: white; border-radius: 10px;
            cursor: pointer; font-size: 0.9rem; text-align: left;
        }
        .theme-btn:hover, .city-option:hover, .language-option:hover { background: rgba(0,212,255,0.3); }

        .container { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px 20px 40px; }
        .logo { width: 110px; height: 110px; margin-bottom: 24px; animation: glow 3s infinite; }
        @keyframes glow { 0%,100% {filter: drop-shadow(0 0 10px var(--accent-color,#00d4ff));} 50% {filter: drop-shadow(0 0 30px var(--accent-color,#00d4ff));} }
        h1 { font-size: 2.8rem; margin-bottom: 16px; color: var(--accent-color,#00d4ff); text-shadow: 0 0 25px var(--accent-color); }
        .description { font-size: 1.1rem; max-width: 520px; line-height: 1.7; margin-bottom: 32px; color: #e0e0e0; }

        .telemetry, .music-section {
            background: rgba(255,255,255,0.05); border: 2px solid var(--accent-color,#00d4ff);
            border-radius: 16px; padding: 24px; margin-bottom: 32px; max-width: 520px;
            backdrop-filter: blur(12px);
        }
        .track-item {
            padding: 12px 16px; background: rgba(255,255,255,0.08); border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .btn-contact {
            background: linear-gradient(135deg, var(--accent-color,#00d4ff), #00f5ff);
            color: #000; padding: 16px 40px; border-radius: 50px; font-size: 1.1rem;
            font-weight: bold; text-decoration: none; margin: 20px 0;
        }
    </style>
</head>
<body>
    <!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NJ649N68"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

    
    <div class="background"></div>
    <div class="light-orbs">
        <div class="orb" style="width:280px;height:280px;background:radial-gradient(circle,#00d4ff,transparent);top:-80px;left:-80px;animation:float 22s infinite;"></div>
        <div class="orb" style="width:240px;height:240px;background:radial-gradient(circle,#ff006e,transparent);bottom:-60px;right:-60px;animation:float 28s infinite reverse;"></div>
    </div>

    <!-- Customization Panel -->
    <div class="customization-panel" id="customPanel">
        <button class="customization-toggle" onclick="togglePanel()">⚙️ Customize</button>
        <div class="customization-content" id="customContent">
            <div class="customization-section">
                <h3>🎨 Colors</h3>
                <div class="color-grid" id="colorGrid"></div>
            </div>
            <div class="customization-section">
                <h3>🌆 City</h3>
                <div class="city-grid" id="cityGrid"></div>
            </div>
            <div class="customization-section">
                <h3>🌐 Language</h3>
                <div class="language-grid" id="languageGrid"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <img src="logo2.png" class="logo" alt="Catalyst Ozwell">
        <h1>Catalyst Ozwell</h1>
        <p class="description" data-i18n="coming-soon">Coming soon, very soon promise KISSES C.O....</p>

        <div class="telemetry">
            <div class="telemetry-title">📡 Live Environmental & Risk Analytics</div>
            <div class="telemetry-grid" id="telemetryGrid"></div>
        </div>

        <!-- Enhanced Audio Player -->
        <div class="music-section">
            <div class="music-title">🎵 Catalyst & Ozwell Soundscapes</div>
            <div id="audioPlayer" style="background:rgba(0,0,0,0.4);border-radius:16px;padding:20px;">
                <div id="nowPlaying" style="margin-bottom:16px;color:var(--accent-color);font-size:1.05rem;">
                    Select a track to begin...
                </div>
                <audio id="mainAudio" style="width:100%;margin-bottom:12px;" controls></audio>
                <div class="track-list" id="trackList" style="display:grid;gap:8px;max-height:340px;overflow-y:auto;"></div>
            </div>
            <small style="opacity:0.7;margin-top:12px;display:block;">Royalty-free calming ambient music</small>
        </div>

        <a href="https://instagram.com/catalystOzwell" target="_blank" class="btn-contact">📱 Contact Us</a>
    </div>

    <script>
        // Cities
        const cities = ["Eindhoven","Amsterdam","Brussels","Geneve","Florence","Rome","Vienne","München","Austin","Pensacola","Washington","Hong Kong","Seoul","Tokyo","Barcelona","London","Paris","Kyiv","Ankara","Azkaban"];
        
        // Calming Tracks (replace URLs with real ones later)
        const tracks = [
            {title: "Catalyst Oasis", src: "https://cdn.pixabay.com/audio/2024/05/12/audio_0e5c5f5e6f.mp3", duration: "4:12"},
            {title: "Ozwell Serenity", src: "https://cdn.pixabay.com/audio/2023/08/15/audio_8f5c2d4e9a.mp3", duration: "5:45"},
            {title: "Calm Catalyst", src: "https://cdn.pixabay.com/audio/2024/02/20/audio_9b3e7f1d2c.mp3", duration: "3:58"},
            {title: "Oz Harmonic Drift", src: "https://cdn.pixabay.com/audio/2025/01/10/audio_4a7b9e2f5d.mp3", duration: "6:22"},
            {title: "Celestial Ozwell", src: "https://cdn.pixabay.com/audio/2024/11/05/audio_3c8e1f6a9b.mp3", duration: "4:50"},
            {title: "Catalyst Lumina", src: "https://cdn.pixabay.com/audio/2023/12/18/audio_2d9f5e7c1a.mp3", duration: "7:10"}
        ];

        function togglePanel() {
            document.getElementById("customPanel").classList.toggle("expanded");
        }

        function initCities() {
            const grid = document.getElementById("cityGrid");
            cities.forEach(city => {
                const btn = document.createElement("button");
                btn.className = "city-option";
                btn.textContent = city;
                btn.onclick = () => {
                    document.querySelectorAll('.city-option').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    updateTelemetry(city);
                };
                grid.appendChild(btn);
            });
        }

        function updateTelemetry(city) {
            document.getElementById("telemetryGrid").innerHTML = `
                <div style="display:flex;justify-content:space-between;padding:8px 0;"><span>📍 Location</span><span style="color:#00ffcc">${city}</span></div>
                <div style="display:flex;justify-content:space-between;padding:8px 0;"><span>🌡️ Temperature</span><span>18°C</span></div>
                <div style="display:flex;justify-content:space-between;padding:8px 0;"><span>🌍 Seismic</span><span>None detected</span></div>
            `;
        }

        function initAudioPlayer() {
            const container = document.getElementById("trackList");
            const audio = document.getElementById("mainAudio");
            const nowPlaying = document.getElementById("nowPlaying");

            tracks.forEach(track => {
                const div = document.createElement("div");
                div.className = "track-item";
                div.innerHTML = `<span>${track.title}</span><span style="opacity:0.7">${track.duration}</span>`;
                div.onclick = () => {
                    audio.src = track.src;
                    audio.play();
                    nowPlaying.textContent = `♪ ${track.title}`;
                    document.querySelectorAll('.track-item').forEach(t => t.style.background = 'rgba(255,255,255,0.08)');
                    div.style.background = 'rgba(0,212,255,0.25)';
                };
                container.appendChild(div);
            });
        }

        window.onload = () => {
            initCities();
            initAudioPlayer();
            updateTelemetry("Amsterdam");
        };
    </script>
</body>
</html>
